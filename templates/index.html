<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent — Gemini Powered</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f23;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 { color: #7c3aed; margin-bottom: 1rem; }
        .chat-box {
            width: 100%;
            max-width: 700px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 300px;
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 1rem;
            border: 1px solid #2a2a4a;
        }
        .message { margin-bottom: 1rem; padding: 0.75rem; border-radius: 8px; }
        .user-msg { background: #2d1b69; text-align: right; }
        .agent-msg { background: #1e293b; }
        .step { font-size: 0.8rem; color: #94a3b8; font-family: monospace; }
        .input-row {
            display: flex; gap: 0.5rem;
            width: 100%; max-width: 700px;
        }
        input {
            flex: 1; padding: 0.75rem; border-radius: 8px;
            border: 1px solid #2a2a4a; background: #1a1a2e; color: white;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem; border-radius: 8px;
            border: none; background: #7c3aed; color: white;
            font-size: 1rem; cursor: pointer;
        }
        button:hover { background: #6d28d9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🤖 AI Agent</h1>
    <div class="chat-box" id="chat"></div>
    <div class="input-row">
        <input id="prompt" placeholder="Ask the agent something..." onkeydown="if(event.key==='Enter') send()" />
        <button id="sendBtn" onclick="send()">Send</button>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('prompt');
            const chat = document.getElementById('chat');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = '';
            btn.disabled = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text }),
                });
                const data = await res.json();
                if (data.steps) {
                    data.steps.forEach(s => {
                        chat.innerHTML += `<div class="message step">⚙️ ${s}</div>`;
                    });
                }
                chat.innerHTML += `<div class="message agent-msg">${data.response || data.error}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="message agent-msg">Error: ${e.message}</div>`;
            }
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
